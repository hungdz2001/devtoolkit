server {
    listen 80;
    server_name tools.tranchanhung.dev;

    root /var/www/tools.tranchanhung.dev;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
